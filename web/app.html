<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FF2010">
<title>DIG</title>
<script src="https://sdk.scdn.co/spotify-player.js"></script>
<div id="yt-host" style="position:absolute;width:1px;height:1px;overflow:hidden;top:-10px;left:-10px;"></div>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #000; }
body { background: #000; color: #ddd; font-family: -apple-system, system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

/* TOP BAR — always visible */
#topbar {
  flex-shrink: 0; background: #0c0c0c; border-bottom: 1px solid #151515;
  display: flex; align-items: center; gap: 12px; padding: 10px 20px; height: 64px;
}
#topbar-logo { font-size: 15px; font-weight: 800; letter-spacing: 2px; color: #FF2010; flex-shrink: 0; }
#player-art {
  width: 44px; height: 44px; border-radius: 6px; background: #151515;
  flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center;
}
#player-art img { width: 100%; height: 100%; object-fit: cover; }
#player-art .no-art { color: #222; font-size: 20px; }
#player-info { flex: 1; min-width: 0; }
#player-track { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#player-artist { font-size: 11px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#player-region-tag { font-size: 9px; color: #444; margin-top: 1px; }
#player-progress { flex: 0 0 100px; height: 3px; background: #1a1a1a; border-radius: 2px; cursor: pointer; }
#player-progress-fill { height: 100%; background: #FF2010; border-radius: 2px; width: 0%; transition: width 0.4s linear; }
#player-time { font-size: 10px; color: #444; flex-shrink: 0; width: 34px; text-align: right; }
.p-btn {
  width: 32px; height: 32px; border-radius: 6px; border: none; background: #1a1a1a;
  color: #888; font-size: 13px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.p-btn:hover { background: #252525; color: #ddd; }
.p-btn.save-btn { font-size: 15px; }
.p-btn.save-btn.saved { background: #3a1a0a; color: #FF2010; }
.p-btn.nah-btn { font-size: 13px; }
.p-btn.nah-btn.disliked { background: #1a1a10; color: #666; }
.p-btn.tailored-active { background: #1a2030; color: #4a9eff; box-shadow: 0 0 6px rgba(74,158,255,0.3); }
#player-status { font-size: 10px; color: #555; flex-shrink: 0; }
.tab-btn {
  width: 32px; height: 32px; border-radius: 6px; border: 1px solid #1a1a1a; background: transparent;
  color: #555; font-size: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  margin-left: 4px;
}
.tab-btn:hover { border-color: #333; color: #aaa; }
.tab-btn.active { background: #FF2010; border-color: #FF2010; color: #fff; }

/* PAGES */
#pages { flex: 1; overflow: hidden; position: relative; }
.page { display: none; height: 100%; overflow-y: auto; }
.page.active { display: flex; flex-direction: column; height: 100%; min-height: 0; }

/* PLAYER PAGE */
#player-page {
  align-items: center; justify-content: center; flex: 1;
}
.player-center { max-width: 400px; width: 100%; text-align: center; }
.player-center #big-art {
  width: 100%; max-width: 360px; aspect-ratio: 1; border-radius: 14px; background: transparent;
  margin: 0 auto 24px; overflow: hidden; display: flex; align-items: center; justify-content: center;
  position: relative;
}
.player-center #big-art.has-art { background: #111; }
.player-center #big-art img { width: 100%; height: 100%; object-fit: cover; }
.player-center #big-art .no-art { color: #1a1a1a; font-size: 80px; display: none; }
#big-play-btn {
  width: 160px; height: 160px; display: flex; align-items: center; justify-content: center;
  background: #FF2010; border: none; cursor: pointer; border-radius: 50%;
  -webkit-tap-highlight-color: transparent; position: relative;
  transition: background 0.15s;
}
#big-play-btn:hover { background: #E61C0E; }
#big-play-btn:active { background: #CC180C; }
#big-play-btn svg { width: 64px; height: 64px; margin-left: 8px; }
#big-play-btn .play-tri { fill: #000; }
.player-center .pc-track { font-size: 20px; font-weight: 700; }
.player-center .pc-artist { font-size: 15px; color: #777; margin-top: 4px; }
.player-center .pc-region { font-size: 11px; color: #444; margin-top: 6px; }
.player-center .pc-hint { font-size: 11px; color: #555; margin-top: 20px; letter-spacing: 0.5px; }

/* Mobile controls */
.mc-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none; background: #1a1a1a;
  color: #888; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.mc-btn:active { background: #252525; color: #ddd; }
.mc-btn.mc-play { width: 56px; height: 56px; font-size: 22px; background: #FF2010; color: #fff; }
.mc-btn.mc-play:active { background: #E61C0E; }
.mc-btn.mc-save.saved { background: #3a1a0a; color: #FF2010; }
.mc-btn.mc-nah.disliked { background: #1a1a10; color: #666; }

/* Heart animation overlay */
.art-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
  font-size: 100px; pointer-events: none; opacity: 0; z-index: 10;
}
.art-overlay.heart { color: #FF2010; text-shadow: 0 0 40px rgba(255,32,16,0.6); }
.art-overlay.nah { color: #555; text-shadow: 0 0 30px rgba(80,80,80,0.4); }
.art-overlay.pop {
  animation: overlayPop 0.7s ease-out forwards;
}
@keyframes overlayPop {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  15% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
  30% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
  60% { transform: translate(-50%, -50%) scale(1.0); opacity: 0.8; }
  100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
}

/* LEDGER PAGE */
#ledger-page {}
#filters {
  padding: 10px 20px; background: #0a0a0a; border-bottom: 1px solid #111;
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center; flex-shrink: 0;
}
#search {
  padding: 5px 10px; background: #111; border: 1px solid #1a1a1a; border-radius: 5px;
  color: #ddd; font-size: 12px; outline: none; width: 160px;
}
#search:focus { border-color: #FF2010; }
.chip {
  padding: 3px 9px; border-radius: 4px; border: 1px solid #1a1a1a; background: #111;
  color: #666; font-size: 11px; cursor: pointer; white-space: nowrap;
}
.chip:hover { border-color: #333; color: #aaa; }
.chip.active { background: #FF2010; border-color: #FF2010; color: #fff; }

/* View toggle */
.view-toggle {
  margin-left: 8px; display: flex; gap: 2px;
}
.view-btn {
  width: 26px; height: 22px; border: 1px solid #1a1a1a; background: #111;
  color: #555; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.view-btn:first-child { border-radius: 4px 0 0 4px; }
.view-btn:last-child { border-radius: 0 4px 4px 0; }
.view-btn:not(:first-child):not(:last-child) { border-radius: 0; }
.view-btn:hover { border-color: #333; color: #aaa; }
.view-btn.active { background: #FF2010; border-color: #FF2010; color: #fff; }

#filter-info { margin-left: auto; font-size: 10px; color: #333; }

/* Explore view */
#explore-view { display: none; flex: 1; position: relative; overflow: hidden; }
#explore-view.active { display: flex; flex-direction: column; }
#explore-canvas { display: block; flex: 1; width: 100%; }
#explore-toolbar {
  display: flex; gap: 4px; padding: 6px 10px; background: #0a0a0a; border-bottom: 1px solid #151515;
  align-items: center; flex-shrink: 0;
}
.explore-mode {
  padding: 3px 10px; border-radius: 4px; border: 1px solid #1a1a1a; background: #111;
  color: #555; font-size: 10px; cursor: pointer; white-space: nowrap;
}
.explore-mode:hover { border-color: #333; color: #aaa; }
.explore-mode.active { background: #FF2010; border-color: #FF2010; color: #fff; }
#explore-search {
  margin-left: auto; background: #111; border: 1px solid #222; color: #aaa; padding: 4px 10px;
  border-radius: 12px; font-size: 11px; width: 140px; outline: none; font-family: inherit;
}
#explore-search:focus { border-color: #FF2010; }
#explore-search::placeholder { color: #333; }
#explore-tooltip {
  display: none; position: fixed; pointer-events: none; z-index: 200;
  background: #111; border: 1px solid #282828; border-radius: 8px;
  padding: 10px 14px; font-size: 12px; max-width: 280px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.ett-track { color: #fff; font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.ett-artist { color: #999; font-size: 11px; margin-bottom: 4px; }
.ett-labels { font-size: 10px; color: #555; line-height: 1.5; }
.ett-labels span { display: inline-block; background: #1a1a1a; padding: 1px 6px; border-radius: 3px; margin: 1px 2px; }
.ett-play { color: #FF2010; font-size: 10px; margin-top: 4px; }

#feed { flex: 1; overflow-y: auto; }
.feed-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 20px;
  border-bottom: 1px solid #0e0e0e; font-size: 13px;
}
.feed-item:hover { background: #0c0c0c; }
.feed-icon { width: 16px; text-align: center; flex-shrink: 0; font-size: 10px; color: #555; }
.feed-icon.listened { color: #FF2010; }
.feed-icon.saved { color: #FF2010; }
.feed-icon.skipped { color: #664; }
.feed-icon.disliked { color: #555; }
.feed-text { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-tags { font-size: 10px; color: #333; flex-shrink: 0; }
.feed-actions { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
.feed-item:hover .feed-actions { opacity: 1; }
.feed-btn { background: none; border: none; color: #444; font-size: 12px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.feed-btn:hover { color: #ddd; background: #1a1a1a; }
.feed-btn.active-save { color: #FF2010; }
.feed-btn.active-dislike { color: #666; }

/* MOBILE */
@media (max-width: 600px) {
  #topbar { padding: 8px 12px; gap: 8px; height: 56px; }
  #topbar-logo { font-size: 13px; }
  #player-art { width: 36px; height: 36px; }
  #player-info { min-width: 0; }
  #player-track { font-size: 12px; }
  #player-artist { font-size: 10px; }
  #player-progress { flex: 0 0 60px; }
  #player-time { display: none; }
  #player-status { display: none; }
  .p-btn { width: 28px; height: 28px; font-size: 12px; }
  .tab-btn { width: 28px; height: 28px; font-size: 11px; }
  #login-link { font-size: 9px; }

  /* Player page — mobile controls */
  .player-center { padding: 12px; }
  .player-center #big-art { max-width: 280px; margin-bottom: 16px; }
  .player-center .pc-track { font-size: 17px; }
  .player-center .pc-artist { font-size: 13px; }
  .player-center .pc-hint { display: none; }

  /* Mobile play controls below art */
  .mobile-controls { display: flex !important; }
  .pc-hint { display: none; }

  /* Feed — always show actions on mobile (no hover) */
  .feed-actions { opacity: 1 !important; }
  .feed-item { padding: 10px 12px; gap: 8px; }
  .feed-text { font-size: 12px; }

  /* Filters */
  #filters { padding: 8px 12px; gap: 4px; }
  .chip { font-size: 10px; padding: 3px 7px; }
  #search { width: 100px; font-size: 11px; }
  .view-toggle { display: flex; }
  #filter-info { font-size: 9px; }
}

/* MAP VIEW */
#map-view { display: none; flex: 1; overflow-y: auto; padding: 16px 20px; }
#map-view.active { display: flex; flex-direction: column; }
.map-dim-tabs {
  display: flex; gap: 4px; margin-bottom: 12px;
}
.map-dim-tab {
  padding: 3px 10px; border-radius: 4px; border: 1px solid #1a1a1a; background: #111;
  color: #555; font-size: 10px; cursor: pointer;
}
.map-dim-tab:hover { border-color: #333; color: #aaa; }
.map-dim-tab.active { background: #FF2010; border-color: #FF2010; color: #fff; }
.map-context-toggle {
  font-size: 10px; color: #444; cursor: pointer; margin-bottom: 12px; user-select: none; display: inline-block;
}
.map-context-toggle:hover { color: #888; }
.map-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.map-row-label {
  width: 110px; font-size: 11px; color: #555; text-align: right; flex-shrink: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.map-row-label.explored { color: #ddd; }
.map-row-bar {
  flex: 1; height: 10px; background: #111; border-radius: 5px; overflow: hidden; position: relative;
}
.map-row-world {
  position: absolute; top: 0; left: 0; height: 100%; background: #1e1e1e; border-radius: 5px;
  transition: width 0.3s;
}
.map-row-user {
  position: absolute; top: 0; left: 0; height: 100%; background: #FF2010; border-radius: 5px;
  transition: width 0.3s; z-index: 1;
}
.map-row-count {
  width: 40px; font-size: 10px; color: #444; flex-shrink: 0;
}
.map-row-saved {
  font-size: 9px; color: #FF2010; width: 36px; flex-shrink: 0;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }
</style>

<body>

<!-- TOP BAR — always visible -->
<div id="topbar">
  <div id="topbar-logo">DIG</div>
  <div id="player-art"><div class="no-art">♫</div></div>
  <div id="player-info">
    <div id="player-track">DIG</div>
    <div id="player-artist">press space to start</div>
    <div id="player-region-tag"></div>
  </div>
  <div id="player-progress"><div id="player-progress-fill"></div></div>
  <div id="player-time">0:00</div>
  <button class="p-btn" id="btn-prev" title="Back 15s">◁</button>
  <button class="p-btn" id="btn-play" title="Play/Pause">▶</button>
  <button class="p-btn" id="btn-skip" title="Next (⌘→)">▷</button>
  <button class="p-btn save-btn" id="btn-save" title="Save (↑)">♡</button>
  <button class="p-btn nah-btn" id="btn-nah" title="Dislike (↓)">✕</button>
  <button class="p-btn" id="btn-tailored" title="Tailored mode" style="font-size:10px; letter-spacing:0.5px;">⊙</button>
  <div id="player-status"></div>
  <button class="tab-btn active" id="tab-player" title="Player">♫</button>
  <button class="tab-btn" id="tab-ledger" title="Ledger">☰</button>
  <a id="login-link" href="/login" style="font-size:10px; color:#555; text-decoration:none; flex-shrink:0; margin-left:4px;">sign in</a>
  <a id="user-btn" href="/logout" title="Logout" style="display:none; width:28px; height:28px; border-radius:50%; overflow:hidden; flex-shrink:0; margin-left:4px;">
    <img id="user-avatar" src="" style="width:100%; height:100%; object-fit:cover;">
  </a>
</div>

<!-- PAGES -->
<div id="pages">
  <!-- PLAYER PAGE -->
  <div id="player-page" class="page active">
    <div class="player-center">
      <div id="big-art">
        <button id="big-play-btn" onclick="handlePlay()">
          <svg viewBox="0 0 80 80"><polygon class="play-tri" points="28,16 28,64 64,40" /></svg>
        </button>
        <div class="art-overlay heart" id="heart-overlay">♥</div>
        <div class="art-overlay nah" id="nah-overlay">✕</div>
      </div>
      <div class="pc-track" id="pc-track">DIG</div>
      <div class="pc-artist" id="pc-artist">press play to start discovering</div>
      <div class="pc-region" id="pc-region"></div>
      <div class="mobile-controls" style="display:none; justify-content:center; align-items:center; gap:16px; margin-top:20px;">
        <button class="mc-btn" id="mc-prev" title="Back 15s">◁</button>
        <button class="mc-btn mc-play" id="mc-play" title="Play">▶</button>
        <button class="mc-btn" id="mc-skip" title="Next">▷</button>
        <button class="mc-btn mc-save" id="mc-save" title="Save">♡</button>
        <button class="mc-btn mc-nah" id="mc-nah" title="Nah">✕</button>
      </div>
      <div class="pc-hint">space pause · ← → skip 15s · ⌘→ next · ↑ save · ↓ nah</div>
      <div id="debug" style="display:none;"></div>
    </div>
  </div>

  <!-- LEDGER PAGE -->
  <div id="ledger-page" class="page">
    <div id="filters">
      <input id="search" placeholder="Search..." />
      <div class="chip active" data-f="all">All</div>
      <div class="chip" data-f="listened">Listened</div>
      <div class="chip" data-f="saved">Saved</div>
      <div class="chip" data-f="skipped">Skipped</div>
      <div class="chip" data-f="disliked">Disliked</div>
      <div class="chip" data-f="known">Library</div>
      <div class="view-toggle">
        <button class="view-btn active" id="view-list" title="List">☰</button>
        <button class="view-btn" id="view-map" title="Bars">◉</button>
        <button class="view-btn" id="view-explore" title="Explore">✦</button>
      </div>
      <div id="filter-info"></div>
    </div>
    <div id="feed"></div>
    <div id="map-view"></div>
    <div id="explore-view">
      <div id="explore-toolbar">
        <div class="explore-mode active" data-mode="genre">Genre</div>
        <div class="explore-mode" data-mode="region">Region</div>
        <div class="explore-mode" data-mode="year">Year</div>
        <span style="width:1px;height:16px;background:#222;margin:0 4px;"></span>
        <div class="explore-mode active" id="tog-pool">Pool</div>
        <div class="explore-mode" id="tog-hist">History</div>
        <input id="explore-search" placeholder="search..." autocomplete="off">
      </div>
      <canvas id="explore-canvas"></canvas>
      <div id="explore-tooltip">
        <div class="ett-track"></div>
        <div class="ett-artist"></div>
        <div class="ett-labels"></div>
        <div class="ett-play">click to play</div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let DATA, DISC, GENRE_MAP = null;
let allDiscovery = [];  // all discovery tracks, shuffled
let dIdx = 0;
let currentFilter = 'all';
let currentView = 'list'; // 'list' or 'map'
let showWorldContext = true;

// ── Tailored mode: taste gravity ──
let tailoredMode = false;
let allTracksPool = [];  // flat array of all tracks (for dynamic picking)
let playedIds = new Set(); // tracks already played this session
// Session taste signals: { id, genre, region, energy, mood, genres[], action, trackIndex, strength }
let tasteSignals = [];
let _tailoredTrackCount = 0; // monotonic counter of tracks played in tailored mode

function getTasteAffinity(track) {
  // Compute how much gravity pulls toward this track based on recent signals.
  // Returns a score: positive = attracted, negative = repelled, 0 = neutral.
  // Decay is by track count (half-life = 20 tracks), not wall-clock time.
  if (!tasteSignals.length) return 0;

  let affinity = 0;
  const now = _tailoredTrackCount;
  const trackGenre = (track._genre || '').toLowerCase();
  const trackGenres = (track.genres || []).map(g => g.toLowerCase());
  const trackRegion = track.region;
  const trackEnergy = track._energy;
  const trackMood = track._mood;

  for (const sig of tasteSignals) {
    // Exponential decay: half-life of 20 tracks played
    const age = now - sig.trackIndex;
    const decay = Math.exp(-age * Math.LN2 / 20);
    if (decay < 0.05) continue; // effectively gone after ~90 tracks

    const weight = sig.strength * decay;

    // Genre similarity via embedding neighbors
    let genreSim = 0;
    if (GENRE_MAP && GENRE_MAP.neighbors) {
      const sigGenre = sig.genre?.toLowerCase();
      // Direct match
      if (trackGenre === sigGenre) {
        genreSim = 1.0;
      } else {
        // Check if track's genre is in signal's top-10 neighbors
        const neighbors = GENRE_MAP.neighbors[sigGenre];
        if (neighbors) {
          const nIdx = neighbors.indexOf(trackGenre);
          if (nIdx >= 0) genreSim = 0.8 - nIdx * 0.07; // 0.8 → 0.1
        }
        // Also check secondary genres
        for (const tg of trackGenres) {
          if (tg === sigGenre) { genreSim = Math.max(genreSim, 0.9); break; }
          const nb = GENRE_MAP.neighbors[sigGenre];
          if (nb) {
            const ni = nb.indexOf(tg);
            if (ni >= 0) genreSim = Math.max(genreSim, 0.7 - ni * 0.06);
          }
        }
      }
    } else {
      // No embedding map — fallback to exact genre match
      genreSim = trackGenre === sig.genre ? 1.0 : 0;
    }

    // Mood/energy similarity (soft match)
    const moodSim = trackMood === sig.mood ? 0.5 : 0;
    const energySim = trackEnergy === sig.energy ? 0.3 : 0;

    // Combine: genre similarity is the primary signal
    // But rotate dimension: if genre matches strongly, DON'T also boost same region
    // This creates the "same vibe, different world" effect
    let dimSim = genreSim * 0.6 + moodSim * 0.25 + energySim * 0.15;

    // Penalty for same region when genre already matches (force exploration)
    if (genreSim > 0.5 && trackRegion === sig.region) {
      dimSim *= 0.6; // reduce affinity for same-genre-same-region
    }

    affinity += weight * dimSim;
  }

  return affinity;
}

function recordTasteSignal(track, action) {
  // action: 'save' (+1.0), 'dislike' (-0.8), 'skip' (-0.2), 'listened' (+0.15)
  const strengthMap = { save: 1.0, dislike: -0.8, skip: -0.2, listened: 0.15 };
  const strength = strengthMap[action] || 0;
  if (strength === 0) return;

  if (action !== 'dislike' && action !== 'skip') _tailoredTrackCount++;

  tasteSignals.push({
    id: track.id,
    genre: (track._genre || '').toLowerCase(),
    genres: (track.genres || []).map(g => g.toLowerCase()),
    region: track.region,
    energy: track._energy,
    mood: track._mood,
    action,
    strength,
    trackIndex: _tailoredTrackCount,
  });

  // Keep only last 100 signals (enough for ~90-track decay window)
  if (tasteSignals.length > 100) tasteSignals = tasteSignals.slice(-100);
}

function pickNextTrack() {
  // Dynamic track picker: diversity + taste gravity.
  // Called on each nextTrack() when tailored mode is on.
  if (!allTracksPool.length) return null;

  const heardIds = new Set(history.map(h => h.id));
  const available = allTracksPool.filter(t => !heardIds.has(t.id) && !playedIds.has(t.id));
  if (!available.length) {
    playedIds.clear(); // reset if pool exhausted
    return allTracksPool[Math.floor(Math.random() * allTracksPool.length)];
  }

  // Recent tracks for diversity scoring
  const recentWindow = 8;
  const recent = [];
  // Walk backwards from current position to find recently played
  for (let i = Math.max(0, dIdx - recentWindow); i < dIdx && i < allDiscovery.length; i++) {
    recent.push(allDiscovery[i]);
  }
  const recentRegions = new Set(recent.map(t => t.region));
  const recentGenres = new Set(recent.map(t => t._genre));
  const recentEnergy = new Set(recent.map(t => t._energy));
  const recentMood = new Set(recent.map(t => t._mood));
  const recentYears = new Set(recent.map(t => t._year));

  // Sample candidates
  const sampleSize = Math.min(120, available.length);
  const candidates = available.length <= sampleSize
    ? available
    : available.sort(() => Math.random() - 0.5).slice(0, sampleSize);

  let bestScore = -Infinity, bestTrack = candidates[0];

  for (const t of candidates) {
    // Base: diversity score (same as before)
    let score = 0;
    if (!recentRegions.has(t.region)) score += 2;
    if (!recentGenres.has(t._genre)) score += 2;
    if (!recentEnergy.has(t._energy)) score += 1;
    if (!recentMood.has(t._mood)) score += 1;
    if (!recentYears.has(t._year)) score += 1;
    score += Math.random() * 1.5;

    // Gravity: taste affinity (scaled so it influences but doesn't dominate)
    // Max affinity ~1.0, scaled to contribute up to ~3 points
    const affinity = getTasteAffinity(t);
    score += affinity * 3;

    if (score > bestScore) { bestScore = score; bestTrack = t; }
  }

  playedIds.add(bestTrack.id);
  return bestTrack;
}

// Session tracking
let history = []; // { track, artist, id, region, status: 'listened'|'skipped'|'saved', time }

async function loadHistory() {
  // Try server first, fall back to localStorage
  try {
    const res = await fetch('/history');
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      history = data;
      localStorage.setItem('dig-history', JSON.stringify(history));
      return;
    }
  } catch(e) {}
  try { history = JSON.parse(localStorage.getItem('dig-history') || '[]'); } catch(e) { history = []; }
}
function saveHistory() {
  localStorage.setItem('dig-history', JSON.stringify(history));
  // Persist to server (fire and forget, debounced)
  clearTimeout(saveHistory._timer);
  saveHistory._timer = setTimeout(() => {
    fetch('/history', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(history),
    }).catch(() => {});
  }, 2000);
}
function addToHistory(track, status) {
  const existing = history.find(h => h.id === track.id);
  if (existing) {
    existing.status = status;
    existing.time = Date.now();
  } else {
    history.unshift({ track: track.name, artist: track.artist, id: track.id, region: track.region || '', status, time: Date.now() });
  }
  saveHistory();
  // Also save to server ledger
  fetch(`/listened?track=${encodeURIComponent(track.artist + ' - ' + track.name)}`).catch(() => {});
  renderFeed();
  renderMap();
}

// ===== UNIFIED PLAYER =====
// Wraps Spotify + YouTube (+ future sources) behind one interface.
// The rest of the app only talks to `Player`.
// YouTube: disabled — no IFrame API load, no yt: playback (pool filtered server-side too).
const DIG_USE_YOUTUBE = false;

const Player = (() => {
  let activeSource = null;   // 'spotify' | 'youtube'
  let _onTrackEnd = null;
  let _onStateChange = null;

  // ── Spotify backend ──
  const spotify = {
    player: null, deviceId: null, token: null, ready: false, _lastArtUrl: null,

    async init() {
      const status = document.getElementById('player-status');
      status.textContent = '...';
      try {
        const res = await fetch('/token');
        const data = await res.json();
        if (data.error) {
          if (data.auth_url) {
            status.textContent = 'login →';
            status.style.cursor = 'pointer';
            status.onclick = () => { window.location.href = '/login'; };
          } else {
            status.textContent = '';
          }
          return;
        }
        spotify.token = data.access_token;
      } catch(e) { status.textContent = '!'; return; }

      spotify.player = new Spotify.Player({
        name: 'DIG',
        getOAuthToken: async cb => {
          try {
            const r = await fetch('/token');
            const d = await r.json();
            if (d.access_token) { spotify.token = d.access_token; cb(spotify.token); }
            else if (d.auth_url) { window.location.href = '/login'; }
            else { cb(spotify.token); }
          } catch(e) { cb(spotify.token); }
        },
        volume: 0.8,
      });

      spotify.player.addListener('ready', ({ device_id }) => {
        spotify.deviceId = device_id;
        spotify.ready = true;
        status.textContent = 'ready';
        console.log('Spotify ready, device:', device_id);
        setTimeout(() => { status.textContent = ''; }, 3000);
      });
      spotify.player.addListener('not_ready', () => { status.textContent = 'offline'; });
      spotify.player.addListener('initialization_error', ({ message }) => { status.textContent = 'init err'; console.error(message); });
      spotify.player.addListener('account_error', ({ message }) => { status.textContent = 'need Premium'; console.error(message); });
      spotify.player.addListener('playback_error', ({ message }) => {
        console.error('Spotify playback error:', message);
      });

      spotify.player.addListener('player_state_changed', state => {
        if (!state) return;
        if (activeSource !== 'spotify') return;
        const pos = state.position, dur = state.duration;
        document.getElementById('btn-play').textContent = state.paused ? '▶' : '❚❚';
        document.getElementById('mc-play').textContent = state.paused ? '▶' : '❚❚';
        if (!state.paused) { Player._clearStuckTimer(); const s = document.getElementById('player-status'); if (s && !s.textContent.includes('tailored')) s.textContent = ''; }
        _updateProgress(pos, dur);
        void syncMediaSessionPlayback();
        // Album art — only update DOM if the URL actually changed
        const images = state.track_window?.current_track?.album?.images;
        if (images && images.length > 0) {
          const url = images[0].url;
          if (url !== spotify._lastArtUrl) {
            spotify._lastArtUrl = url;
            document.getElementById('player-art').innerHTML = `<img src="${url}">`;
            const ba = document.getElementById('big-art');
            ba.innerHTML = `<img src="${url}"><div class="art-overlay heart" id="heart-overlay">♥</div><div class="art-overlay nah" id="nah-overlay">✕</div>`;
            ba.classList.add('has-art');
            if ('mediaSession' in navigator && navigator.mediaSession.metadata) {
              navigator.mediaSession.metadata.artwork = [{ src: url, sizes: '300x300', type: 'image/jpeg' }];
            }
          }
        }
        // Track ended
        if (state.paused && state.position === 0 && state.track_window.previous_tracks.length > 0) {
          if (_onTrackEnd) _onTrackEnd();
        }
      });

      spotify.player.addListener('authentication_error', () => {
        status.textContent = 'auth err';
        setTimeout(() => spotify.init(), 3000);
      });

      await spotify.player.connect();
    },

    async play(trackId) {
      if (!spotify.deviceId || !spotify.token) {
        console.warn('[DIG] spotify.play: no deviceId or token', { deviceId: spotify.deviceId, hasToken: !!spotify.token });
        return false;
      }
      youtube.stop();
      activeSource = 'spotify';
      spotify._lastArtUrl = null;
      try {
        // Fetch a fresh token before each play to avoid 401s from stale tokens
        try {
          const tr = await fetch('/token');
          const td = await tr.json();
          if (td.access_token) {
            spotify.token = td.access_token;
          } else if (td.auth_url) {
            window.location.href = '/login';
            return false;
          }
        } catch(e) { /* use existing token */ }

        const resp = await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${spotify.deviceId}`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${spotify.token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ uris: [`spotify:track:${trackId}`] }),
        });
        if (!resp.ok) {
          if (resp.status === 401) {
            console.warn('[DIG] Spotify token expired — redirecting to login');
            window.location.href = '/login';
            return false;
          }
          console.error(`[DIG] spotify.play FAILED: ${resp.status}`);
          return false;
        }
        document.getElementById('btn-play').textContent = '❚❚'; document.getElementById('mc-play').textContent = '❚❚';
        _startPoll();
        return true;
      } catch (err) {
        console.error('[DIG] spotify.play fetch error:', err);
        return false;
      }
    },

    async togglePlay() { if (spotify.player) await spotify.player.togglePlay(); },

    async seek(posMs) { if (spotify.player) await spotify.player.seek(posMs); },

    async getState() {
      if (!spotify.player) return null;
      const s = await spotify.player.getCurrentState();
      if (!s) return null;
      return { position: s.position, duration: s.duration, paused: s.paused };
    },

    stop() {
      if (spotify.player) spotify.player.pause().catch(() => {});
    },
  };

  // ── YouTube backend ──
  const youtube = {
    player: null, ready: false, _apiLoaded: false, _duration: 0,

    init() {
      if (youtube._apiLoaded) return;
      youtube._apiLoaded = true;
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
      window.onYouTubeIframeAPIReady = () => {
        youtube.player = new YT.Player('yt-host', {
          width: '1', height: '1',
          playerVars: {
            autoplay: 0, controls: 0, disablekb: 1, fs: 0, modestbranding: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: () => { youtube.ready = true; console.log('YouTube player ready'); },
            onStateChange: (e) => {
              if (activeSource !== 'youtube') return;
              if (e.data === YT.PlayerState.ENDED) {
                if (_onTrackEnd) _onTrackEnd();
              }
              if (e.data === YT.PlayerState.PLAYING) {
                Player._clearStuckTimer();
                youtube._duration = youtube.player.getDuration() * 1000;
                document.getElementById('btn-play').textContent = '❚❚'; document.getElementById('mc-play').textContent = '❚❚';
              }
              if (e.data === YT.PlayerState.PAUSED) {
                document.getElementById('btn-play').textContent = '▶'; document.getElementById('mc-play').textContent = '▶';
              }
              // OS / AirPods use Media Session on the *page*; YT audio is in an iframe, so we must
              // publish playbackState + position here or hardware controls stay bound to nothing useful.
              void syncMediaSessionPlayback();
            },
            onError: (e) => {
              console.error('YT error:', e.data);
              // Skip to next on error (video unavailable, etc.)
              if (_onTrackEnd) _onTrackEnd();
            },
          },
        });
      };
    },

    play(videoId, thumb) {
      dbg(`yt.play: id=${videoId}, player=${!!youtube.player}, ready=${youtube.ready}`);
      if (!youtube.player || !youtube.ready) { dbg('yt not ready, aborting'); return false; }
      if (!videoId) { console.warn('[DIG] yt.play: no videoId'); return false; }
      spotify.stop(); // make sure Spotify is silent
      activeSource = 'youtube';
      youtube.player.loadVideoById(videoId);
      youtube._duration = 0;
      document.getElementById('btn-play').textContent = '❚❚'; document.getElementById('mc-play').textContent = '❚❚';
      // Set thumbnail
      if (thumb) {
        document.getElementById('player-art').innerHTML = `<img src="${thumb}">`;
        document.getElementById('big-art').innerHTML = `<img src="${thumb}"><div class="art-overlay heart" id="heart-overlay">♥</div><div class="art-overlay nah" id="nah-overlay">✕</div>`;
      } else {
        const thumbUrl = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
        document.getElementById('player-art').innerHTML = `<img src="${thumbUrl}">`;
        document.getElementById('big-art').innerHTML = `<img src="${thumbUrl}"><div class="art-overlay heart" id="heart-overlay">♥</div><div class="art-overlay nah" id="nah-overlay">✕</div>`;
      }
      _startPoll();
      return true;
    },

    togglePlay() {
      if (!youtube.player) return;
      const state = youtube.player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) youtube.player.pauseVideo();
      else youtube.player.playVideo();
    },

    seek(posMs) {
      if (youtube.player) youtube.player.seekTo(posMs / 1000, true);
    },

    getState() {
      if (!youtube.player || !youtube.ready) return null;
      const state = youtube.player.getPlayerState();
      if (state === -1) return null; // unstarted
      return {
        position: youtube.player.getCurrentTime() * 1000,
        duration: youtube._duration || (youtube.player.getDuration() * 1000),
        paused: state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED,
      };
    },

    stop() {
      if (youtube.player && youtube.ready) {
        try { youtube.player.stopVideo(); } catch(e) {}
      }
    },
  };

  // ── Shared helpers ──
  let _pollInterval = null;

  function _updateProgress(posMs, durMs) {
    if (!durMs) return;
    document.getElementById('player-progress-fill').style.width = ((posMs / durMs) * 100) + '%';
    document.getElementById('player-time').textContent = _msToTime(posMs);
  }

  function _msToTime(ms) {
    const s = Math.floor(ms / 1000);
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function _startPoll() {
    if (_pollInterval) clearInterval(_pollInterval);
    _pollInterval = setInterval(async () => {
      const state = await Player.getState();
      if (state) _updateProgress(state.position, state.duration);
      void syncMediaSessionPlayback();
    }, 500);
  }

  /** Keep lock screen / AirPods / Control Center in sync (critical for YouTube-in-iframe). */
  async function syncMediaSessionPlayback() {
    if (!('mediaSession' in navigator)) return;
    if (!activeSource) {
      try { navigator.mediaSession.playbackState = 'none'; } catch (e) {}
      return;
    }
    const st = activeSource === 'youtube' ? youtube.getState() : await spotify.getState();
    if (!st) {
      try { navigator.mediaSession.playbackState = 'none'; } catch (e) {}
      return;
    }
    try {
      navigator.mediaSession.playbackState = st.paused ? 'paused' : 'playing';
    } catch (e) {}
    if (!navigator.mediaSession.setPositionState) return;
    const durSec = st.duration / 1000;
    if (!durSec || durSec <= 0 || !isFinite(durSec)) return;
    let pos = st.position / 1000;
    pos = Math.min(Math.max(pos, 0), Math.max(durSec - 0.05, 0));
    try {
      navigator.mediaSession.setPositionState({
        duration: durSec,
        playbackRate: st.paused ? 0 : 1,
        position: pos,
      });
    } catch (e) {
      try {
        navigator.mediaSession.setPositionState({
          duration: durSec,
          playbackRate: 1,
          position: pos,
        });
      } catch (e2) {
        try { navigator.mediaSession.setPositionState(null); } catch (e3) {}
      }
    }
  }

  // ── Public API ──
  return {
    async init() {
      if (DIG_USE_YOUTUBE) youtube.init();
      await spotify.init();
    },

    onTrackEnd(fn) { _onTrackEnd = fn; },

    isReady() {
      return spotify.ready || (DIG_USE_YOUTUBE && youtube.ready);
    },
    isSpotifyReady() { return spotify.ready; },
    isPlaying() { return this._playing; },

    get spotifyReady() { return spotify.ready; },
    get spotifyDeviceId() { return spotify.deviceId; },

    _playing: false,
    _stuckTimer: null,

    _clearStuckTimer() {
      if (this._stuckTimer) { clearTimeout(this._stuckTimer); this._stuckTimer = null; }
    },

    _startStuckTimer(track) {
      this._clearStuckTimer();
      this._stuckTimer = setTimeout(async () => {
        // Check if anything is actually playing
        const state = await Player.getState();
        if (!state || state.paused) {
          console.warn(`[DIG] STUCK detected: "${track.artist} - ${track.name}" [${track.source||'spotify'}] id=${track.id} — no playback after 8s, auto-skipping`);
          if (_onTrackEnd) _onTrackEnd();
        }
      }, 8000);
    },

    async play(track) {
      this._clearStuckTimer();
      // Guard against concurrent playback calls
      if (this._playing) {
        spotify.stop();
        youtube.stop();
        await new Promise(r => setTimeout(r, 100));
      }
      this._playing = true;
      try {
        const source = track.source || 'spotify';
        if (!DIG_USE_YOUTUBE && (source === 'youtube' || String(track.id || '').startsWith('yt:'))) {
          console.warn('[DIG] YouTube playback disabled, skipping');
          return false;
        }
        let trackId = source === 'youtube' ? (track.youtube_id || track.id) : track.id;
        if (source === 'youtube' && trackId.startsWith('yt:')) trackId = trackId.slice(3);
        console.log(`[DIG] Player.play: "${track.artist} - ${track.name}" source=${source} id=${trackId}`);

        if (source === 'youtube') {
          const ok = youtube.play(trackId, track.thumbnail);
          if (!ok) {
            console.warn(`[DIG] YouTube play returned false for "${track.name}"`);
            return false;
          }
          this._startStuckTimer(track);
          return true;
        } else {
          if (!spotify.ready) {
            console.warn(`[DIG] Spotify not ready, cannot play "${track.name}"`);
            return false;
          }
          const ok = await spotify.play(trackId);
          if (!ok) {
            console.warn(`[DIG] Spotify play returned false for "${track.name}" id=${trackId}`);
            return false;
          }
          this._startStuckTimer(track);
          return true;
        }
      } finally {
        this._playing = false;
      }
    },

    async togglePlay() {
      if (activeSource === 'youtube') youtube.togglePlay();
      else await spotify.togglePlay();
    },

    async seekRelative(ms) {
      const state = await this.getState();
      if (!state) {
        console.warn('[DIG playback] seekRelative: no state', { ms, activeSource });
        return;
      }
      const dur = state.duration;
      if (!dur || dur < 1000 || !isFinite(dur)) {
        // Spotify SDK often reports duration: 0 briefly after a track change; seeking then clamps to 0 → "restart".
        console.warn('[DIG playback] seekRelative: skipped (no duration yet)', { ms, dur, pos: state.position });
        return;
      }
      const target = Math.max(0, Math.min(dur, state.position + ms));
      console.log('[DIG playback] seekRelative', { ms, from: state.position, to: target, dur });
      if (activeSource === 'youtube') youtube.seek(target);
      else await spotify.seek(target);
    },

    async seekTo(posMs) {
      const state = await this.getState();
      if (!state) return;
      const dur = state.duration;
      if (!dur || dur < 1000 || !isFinite(dur)) {
        console.warn('[DIG playback] seekTo: skipped (no duration yet)', { posMs, dur });
        return;
      }
      const clamped = Math.max(0, Math.min(dur, posMs));
      console.log('[DIG playback] seekTo', { posMs: clamped, dur });
      if (activeSource === 'youtube') youtube.seek(clamped);
      else await spotify.seek(clamped);
    },

    async getState() {
      if (activeSource === 'youtube') return youtube.getState();
      return await spotify.getState();
    },

    get activeSource() { return activeSource; },

    syncMediaSession: () => syncMediaSessionPlayback(),
  };
})();

// Spotify SDK callback
window.onSpotifyWebPlaybackSDKReady = () => Player.init();
// Also init YouTube independently in case Spotify SDK doesn't fire (e.g. mobile)
setTimeout(() => { if (!Player.isReady()) Player.init(); }, 2000);

// ===== PLAYER LOGIC =====
function currentTrack() { return allDiscovery[dIdx]; }

/** Structured logs for playback / queue debugging (filter console by `[DIG`). */
function playDbg(event, extra = {}) {
  try {
    console.log('[DIG playback]', event, Object.assign({
      dIdx,
      queueLen: allDiscovery.length,
      playingId: currentTrack()?.id,
    }, extra));
  } catch (e) {}
}

let _playLock = false;
function playCurrentTrack() {
  if (_playLock) return;
  _playLock = true;
  expMarkDirty();
  const t = currentTrack();
  dbg(`playCurrentTrack: ${t ? t.artist+' - '+t.name+' ['+( t.source||'spotify')+'] id='+t.id : 'NO TRACK'}`);
  if (!t) { dbg('no track, returning'); _playLock = false; return; }
  playDbg('playCurrentTrack:start', { id: t.id, name: t.name, artist: t.artist, source: t.source || 'spotify' });
  const regionTag = '';

  // Top bar
  document.getElementById('player-track').textContent = t.name;
  document.getElementById('player-artist').textContent = t.artist;
  document.getElementById('player-region-tag').textContent = regionTag;

  // Big player page
  document.getElementById('pc-track').textContent = t.name;
  document.getElementById('pc-artist').textContent = t.artist;
  document.getElementById('pc-region').textContent = regionTag;

  // Set album art immediately to avoid a glitch gap before Spotify's
  // player_state_changed event fires with the real artwork URL
  const source = t.source || 'spotify';
  let artUrl = '';
  if (source === 'youtube') {
    let ytId = t.youtube_id || t.id || '';
    if (ytId.startsWith('yt:')) ytId = ytId.slice(3);
    artUrl = `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
  }
  if (artUrl) {
    document.getElementById('player-art').innerHTML = `<img src="${artUrl}">`;
    const ba = document.getElementById('big-art');
    ba.innerHTML = `<img src="${artUrl}"><div class="art-overlay heart" id="heart-overlay">♥</div><div class="art-overlay nah" id="nah-overlay">✕</div>`;
    ba.classList.add('has-art');
  } else {
    // For Spotify: clear old art to show a clean ♫ placeholder until
    // the SDK provides the real cover via player_state_changed
    document.getElementById('player-art').innerHTML = '<div class="no-art">♫</div>';
    const ba = document.getElementById('big-art');
    ba.innerHTML = '<div class="no-art">♫</div><div class="art-overlay heart" id="heart-overlay">♥</div><div class="art-overlay nah" id="nah-overlay">✕</div>';
    ba.classList.remove('has-art');
  }

  // Media session metadata (lock screen, AirPods, control center)
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.name,
      artist: t.artist,
      album: t.album || regionTag,
      artwork: artUrl ? [{ src: artUrl, sizes: '300x300', type: 'image/jpeg' }] : [],
    });
    try { navigator.mediaSession.playbackState = 'playing'; } catch (e) {}
    initMediaSessionHandlers();
    void Player.syncMediaSession();
  }

  // Reset save/dislike buttons (topbar + mobile)
  const btn = document.getElementById('btn-save');
  const mcSave = document.getElementById('mc-save');
  const mcNah = document.getElementById('mc-nah');
  const wasSaved = history.find(h => h.id === t.id && h.status === 'saved');
  btn.textContent = wasSaved ? '♥' : '♡';
  btn.classList.toggle('saved', !!wasSaved);
  mcSave.textContent = wasSaved ? '♥' : '♡';
  mcSave.classList.toggle('saved', !!wasSaved);
  const wasDisliked = history.find(h => h.id === t.id && h.status === 'disliked');
  document.getElementById('btn-nah').classList.toggle('disliked', !!wasDisliked);
  mcNah.classList.toggle('disliked', !!wasDisliked);

  dbg(`calling Player.play for "${t.artist} - ${t.name}" [${t.source||'spotify'}] id=${t.id}`);
  Player.play(t).then(ok => {
    _playLock = false;
    dbg(`Player.play returned: ${ok} for "${t.name}"`);
    playDbg('Player.play:result', { ok, id: t.id, name: t.name });
    if (!ok) {
      console.warn(`[DIG] Play FAILED for "${t.artist} - ${t.name}" [${t.source||'spotify'}] id=${t.id} — skipping to next`);
      dIdx++;
      let attempts = 0;
      while (attempts < allDiscovery.length) {
        const next = allDiscovery[dIdx % allDiscovery.length];
        if (next && Player.isSpotifyReady()) break;
        dIdx++;
        attempts++;
      }
      if (dIdx >= allDiscovery.length) dIdx = dIdx % allDiscovery.length;
      playCurrentTrack();
      return;
    }
    addToHistory(t, 'listened');
    playDbg('history:listened', { id: t.id, name: t.name });
    if (tailoredMode) recordTasteSignal(t, 'listened');
  }).catch(() => { _playLock = false; });
}

function prevTrack() {
  if (!allDiscovery.length) return;
  playDbg('prevTrack', { fromIdx: dIdx });
  if (tailoredMode) {
    dIdx = (dIdx - 1 + allDiscovery.length) % allDiscovery.length;
    playCurrentTrack();
    return;
  }
  dIdx = (dIdx - 1 + allDiscovery.length) % allDiscovery.length;
  playCurrentTrack();
}

function nextTrack(isSkip = true) {
  playDbg(isSkip ? 'nextTrack:skip' : 'nextTrack:ended', { fromIdx: dIdx, isSkip });
  // Mark current as skipped if user pressed skip
  const t = currentTrack();
  if (t && isSkip) {
    const existing = history.find(h => h.id === t.id);
    if (existing && existing.status === 'listened') {
      existing.status = 'skipped';
      saveHistory();
      renderFeed();
    }
    if (tailoredMode) recordTasteSignal(t, 'skip');
  }

  if (tailoredMode) {
    // Dynamic picking: insert next track into the queue at current position
    const next = pickNextTrack();
    if (next) {
      dIdx++;
      allDiscovery.splice(dIdx, 0, next);
      playCurrentTrack();
      return;
    }
  }

  dIdx++;
  // Skip tracks already listened/skipped
  let attempts = 0;
  while (dIdx < allDiscovery.length && attempts < allDiscovery.length) {
    const next = allDiscovery[dIdx];
    const inHistory = history.find(h => h.id === next.id);
    if (!inHistory) break; // never heard — play it
    dIdx++;
    attempts++;
  }
  if (dIdx >= allDiscovery.length) dIdx = 0; // wrap

  playCurrentTrack();
}

function saveCurrentTrack() {
  const t = currentTrack();
  if (!t) return;
  document.getElementById('btn-save').textContent = '♥';
  document.getElementById('btn-save').classList.add('saved');
  document.getElementById('mc-save').textContent = '♥';
  document.getElementById('mc-save').classList.add('saved');
  document.getElementById('btn-nah').classList.remove('disliked');
  document.getElementById('mc-nah').classList.remove('disliked');
  addToHistory(t, 'saved');
  if (tailoredMode) recordTasteSignal(t, 'save');
  triggerOverlay('heart-overlay');
  fetch(`/save?track=${encodeURIComponent(t.artist+' - '+t.name)}&region=${encodeURIComponent(t.region||'')}`).catch(() => {});
}

function dislikeCurrentTrack() {
  const t = currentTrack();
  if (!t) return;
  document.getElementById('btn-nah').classList.add('disliked');
  document.getElementById('mc-nah').classList.add('disliked');
  document.getElementById('btn-save').textContent = '♡';
  document.getElementById('btn-save').classList.remove('saved');
  document.getElementById('mc-save').textContent = '♡';
  document.getElementById('mc-save').classList.remove('saved');
  addToHistory(t, 'disliked');
  if (tailoredMode) recordTasteSignal(t, 'dislike');
  triggerOverlay('nah-overlay');
  setTimeout(() => nextTrack(false), 500);
}

// ===== FEED/LEDGER =====
function renderFeed() {
  if (!DATA) return;
  if (currentView !== 'list') return;
  const el = document.getElementById('feed');
  const search = (document.getElementById('search').value || '').toLowerCase();

  let items = [];

  if (currentFilter === 'all' || currentFilter === 'listened' || currentFilter === 'skipped' || currentFilter === 'saved' || currentFilter === 'disliked') {
    // Session history
    for (const h of history) {
      if (currentFilter !== 'all' && h.status !== currentFilter) continue;
      items.push({
        text: `${h.artist} - ${h.track}`,
        icon: h.status === 'saved' ? '♥' : h.status === 'disliked' ? '✕' : h.status === 'skipped' ? '→' : '▶',
        iconClass: h.status,
        region: h.region,
        id: h.id,
      });
    }
  }

  if (currentFilter === 'all' || currentFilter === 'known') {
    // Full library
    const historyIds = new Set(history.map(h => h.id));
    const historyTracks = new Set(history.map(h => `${h.artist} - ${h.track}`.toLowerCase()));
    for (const k of DATA.known) {
      if (!historyTracks.has(k.toLowerCase())) {
        items.push({ text: k, icon: '', iconClass: '', region: '' });
      }
    }
  }

  if (search) items = items.filter(i => i.text.toLowerCase().includes(search));

  document.getElementById('filter-info').textContent = `${items.length} tracks`;

  el.innerHTML = items.slice(0, 400).map((i, idx) => {
    const isSaved = i.iconClass === 'saved';
    const isDisliked = i.iconClass === 'disliked';
    return `
    <div class="feed-item" data-idx="${idx}">
      <div class="feed-icon ${i.iconClass}">${i.icon}</div>
      <div class="feed-text">${i.text}</div>
      <div class="feed-actions">
        <button class="feed-btn ${isSaved ? 'active-save' : ''}" data-action="save" data-id="${i.id || ''}" data-text="${i.text}" title="Like">♥</button>
        <button class="feed-btn ${isDisliked ? 'active-dislike' : ''}" data-action="dislike" data-id="${i.id || ''}" data-text="${i.text}" title="Dislike">✕</button>
      </div>
    </div>`;
  }).join('') + (items.length > 400 ? `<div class="feed-item" style="color:#222">+${items.length-400} more</div>` : '');

  // Wire up feed action buttons
  el.querySelectorAll('.feed-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      const text = btn.dataset.text;
      feedAction(action, id, text);
    });
  });

  // Wire up row click to play
  el.querySelectorAll('.feed-item').forEach(item => {
    item.style.cursor = 'pointer';
    item.addEventListener('click', () => {
      const id = item.querySelector('.feed-btn')?.dataset.id;
      const text = item.querySelector('.feed-text')?.textContent;
      if (!id && !text) return;
      // Find in discovery pool
      const idx = allDiscovery.findIndex(t => (id && t.id === id) || `${t.artist} - ${t.name}` === text);
      if (idx >= 0) {
        dIdx = idx;
        playCurrentTrack();
      }
    });
  });
}

function feedAction(action, id, text) {
  // Find or create history entry
  let entry = id ? history.find(h => h.id === id) : history.find(h => `${h.artist} - ${h.track}` === text);

  if (!entry) {
    // Parse "artist - track" from text
    const parts = text.split(' - ');
    const artist = parts[0] || text;
    const track = parts.slice(1).join(' - ') || text;
    entry = { track, artist, id: id || '', region: '', status: 'listened', time: Date.now() };
    history.unshift(entry);
  }

  if (action === 'save') {
    // Toggle: if already saved, un-save (back to listened)
    entry.status = entry.status === 'saved' ? 'listened' : 'saved';
    if (entry.status === 'saved') {
      fetch(`/save?track=${encodeURIComponent(entry.artist + ' - ' + entry.track)}`).catch(() => {});
    }
  } else if (action === 'dislike') {
    // Toggle: if already disliked, un-dislike (back to listened)
    entry.status = entry.status === 'disliked' ? 'listened' : 'disliked';
  }

  entry.time = Date.now();
  saveHistory();
  renderFeed();
}

let mapDimension = 'region'; // 'region', 'genre', 'year'

function gatherMapData() {
  const userCount = {};
  const savedCount = {};

  // Session history
  for (const h of history) {
    let keys = [];
    if (mapDimension === 'region') keys = [h.region || 'Unknown'];
    else if (mapDimension === 'genre') {
      // Try to find tags from spotify_tracks
      const st = (DATA.spotify_tracks || []).find(t => t.id === h.id);
      keys = st ? st.tags.slice(0, 3) : ['unknown'];
      if (!keys.length) keys = ['unknown'];
    } else if (mapDimension === 'year') {
      const st = (DATA.spotify_tracks || []).find(t => t.id === h.id);
      keys = [st && st.added ? st.added.slice(0, 4) + 's' : 'unknown'];
    }
    for (const k of keys) {
      userCount[k] = (userCount[k] || 0) + 1;
      if (h.status === 'saved') savedCount[k] = (savedCount[k] || 0) + 1;
    }
  }

  // From data.json
  if (mapDimension === 'region' && DATA.user_region_count) {
    for (const [r, c] of Object.entries(DATA.user_region_count))
      userCount[r] = (userCount[r] || 0) + c;
  }
  if (mapDimension === 'year' && DATA.user_decade_count) {
    for (const [d, c] of Object.entries(DATA.user_decade_count))
      userCount[d] = (userCount[d] || 0) + c;
  }
  if (mapDimension === 'genre' && DATA.tags) {
    for (const [tag, c] of DATA.tags)
      userCount[tag] = (userCount[tag] || 0) + c;
  }

  return { userCount, savedCount };
}

function getWorldEstimates() {

function getAllKeys() {
  if (mapDimension === 'region') return DATA.regions || [];
  if (mapDimension === 'year') return ['1920s','1930s','1940s','1950s','1960s','1970s','1980s','1990s','2000s','2010s','2020s'];

function renderMap() {
  if (!DATA) return;
  if (currentView !== 'map') return;
  const el = document.getElementById('map-view');
  const { userCount, savedCount } = gatherMapData();
  const world = getWorldEstimates();
  const allKeys = getAllKeys();

  // Merge any keys from userCount not in allKeys
  const keySet = new Set(allKeys);
  for (const k of Object.keys(userCount)) { if (!keySet.has(k) && k !== 'unknown') { allKeys.push(k); keySet.add(k); } }

  const maxWorld = Math.max(...Object.values(world), 1);
  const maxUser = Math.max(...Object.values(userCount), 1);

  let html = '';

  // Dimension tabs
  html += `<div class="map-dim-tabs">
    <div class="map-dim-tab ${mapDimension==='region'?'active':''}" onclick="setMapDim('region')">Region</div>
    <div class="map-dim-tab ${mapDimension==='genre'?'active':''}" onclick="setMapDim('genre')">Genre</div>
    <div class="map-dim-tab ${mapDimension==='year'?'active':''}" onclick="setMapDim('year')">Year</div>
  </div>`;

  // Context toggle
  html += `<div class="map-context-toggle" onclick="toggleWorldContext()">
    ${showWorldContext ? '◉' : '○'} world context
  </div>`;

  // Sort: explored first, then by world estimate
  const sorted = [...allKeys].sort((a, b) => {
    const aU = userCount[a] || 0, bU = userCount[b] || 0;
    if (aU > 0 && bU === 0) return -1;
    if (bU > 0 && aU === 0) return 1;
    return (world[b] || 0) - (world[a] || 0);
  });

  for (const key of sorted) {
    const user = userCount[key] || 0;
    const saved = savedCount[key] || 0;
    const w = world[key] || 0;
    // When context is on, scale user bar relative to world; when off, relative to max user
    const worldPct = showWorldContext ? Math.max(3, (w / maxWorld) * 100) : 0;
    const userPct = user > 0 ? (showWorldContext
      ? Math.max(2, (user / (maxWorld * 1.5)) * 100) // scale against world so you see how small you are
      : Math.max(2, (user / maxUser) * 100)
    ) : 0;

    html += `<div class="map-row">
      <div class="map-row-label ${user > 0 ? 'explored' : ''}">${key}</div>
      <div class="map-row-bar">
        ${showWorldContext ? `<div class="map-row-world" style="width:${worldPct}%"></div>` : ''}
        <div class="map-row-user" style="width:${userPct}%"></div>
      </div>
      <div class="map-row-count">${user || ''}</div>
      <div class="map-row-saved">${saved > 0 ? '♥ ' + saved : ''}</div>
    </div>`;
  }

  // Summary
  const totalExplored = sorted.filter(k => (userCount[k] || 0) > 0).length;
  const totalSaved = Object.values(savedCount).reduce((a, b) => a + b, 0);
  html += `<div style="margin-top:16px;padding-top:12px;border-top:1px solid #111;font-size:10px;color:#333">
    ${totalExplored}/${sorted.length} explored · ${totalSaved} saved
  </div>`;

  el.innerHTML = html;
}

function setMapDim(dim) {
  mapDimension = dim;
  renderMap();
}

function toggleWorldContext() {
  showWorldContext = !showWorldContext;

}

function inferRegionFromGenres(genres) {
  if (!genres || !genres.length) return null;
  const text = genres.join(' ').toLowerCase();
  for (const [pattern, region] of GENRE_REGION_HINTS) {
    if (pattern.test(text)) return region;
  }
  return null;
}

// ── Color from vibe labels ──
function vibeColor(labels, fallbackHue) {
  if (!labels || !labels.energy) {
    // Fallback: use hue from region
    return `hsl(${fallbackHue}, 30%, 25%)`;
  }
  // Energy → lightness
  const energyMap = {'very low': 18, 'low': 25, 'moderate': 35, 'high': 48, 'very high': 60};
  const lightness = energyMap[labels.energy] || 35;

  // Mood → hue (keyword matching)
  const mood = (labels.mood || '').toLowerCase();
  let hue = fallbackHue;
  if (/seren|calm|meditat|peace|tranquil|gentle/.test(mood)) hue = 210;
  else if (/warm|nostalg|golden|amber|cozy/.test(mood)) hue = 35;
  else if (/dark|heavy|aggress|intense|raw|grit/.test(mood)) hue = 330;
  else if (/bright|joy|euphor|uplift|happy|celebr/.test(mood)) hue = 80;
  else if (/myster|ethereal|dream|haunt|eerie/.test(mood)) hue = 270;
  else if (/bitter|melan|sad|sorrow|longing/.test(mood)) hue = 240;
  else if (/playful|funky|groov|bounce/.test(mood)) hue = 50;
  else if (/rebel|punk|chaos|frenet/.test(mood)) hue = 0;
  else if (/spirit|sacred|devot|reveren/.test(mood)) hue = 290;

  const saturation = lightness > 40 ? 65 : 45;
  return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
}

function vibeColorBright(labels, fallbackHue) {
  if (!labels || !labels.energy) return `hsl(${fallbackHue}, 40%, 50%)`;
  const mood = (labels.mood || '').toLowerCase();
  let hue = fallbackHue;
  if (/seren|calm|meditat|peace/.test(mood)) hue = 210;
  else if (/warm|nostalg|golden/.test(mood)) hue = 35;
  else if (/dark|heavy|aggress|intense/.test(mood)) hue = 330;
  else if (/bright|joy|euphor|uplift/.test(mood)) hue = 80;
  else if (/myster|ethereal|dream/.test(mood)) hue = 270;
  else if (/bitter|melan|sad/.test(mood)) hue = 240;
  return `hsl(${hue}, 70%, 60%)`;
}

// ── Extract genre from track ──
// Returns a clean lowercase genre string, or 'unknown' for ungroupable tracks.
function extractGenre(track) {
  // Prefer DB-backed Spotify genres (now backfilled from the artists table)
  if (track && track.genres && track.genres.length > 0) {
    const g = track.genres[0];
    if (g && !_isBadGenre(g)) return g.toLowerCase();
  }
  // Fall back to the search query that found this track
  const query = (track && track.query) || '';
  if (!query) return 'unknown';
  let g = query;
  if (g.startsWith('catalog:'))    g = g.slice(8);
  else if (g.startsWith('hint:'))  g = g.slice(5);
  else if (g.startsWith('ai:'))    g = g.slice(3);
  else if (g.startsWith('random:')) return 'unknown';
  else if (g.startsWith('artist:')) return 'unknown'; // artist-search tracks have no genre signal
  if (g.includes(' year:')) g = g.split(' year:')[0];
  g = g.trim().toLowerCase();
  // Reject strings that still look like search queries or raw titles
  if (_isBadGenre(g)) return 'unknown';
  return g || 'unknown';
}

function _isBadGenre(g) {
  if (!g) return true;
  if (g.startsWith('artist:')) return true;
  if (g === 'unknown' || g === 'random') return true;
  // Looks like a YouTube title or raw search string
  if (g.includes('#') || g.includes('@') || g.includes('http') || g.length > 80) return true;
  return false;
}

// ── Extract year from query field (fallback) ──
function extractYear(query) {
  if (!query) return null;
  const m = query.match(/year:(\d{4})/);
  return m ? parseInt(m[1]) : null;
}

// ── Layout algorithms ──
// Pack clusters tightly using a grid-spiral that adapts to cluster count

function packCenters(items, clusterSize) {
  // Hexagonal packing — tight, no big gaps
  const n = items.length;
  const cols = Math.ceil(Math.sqrt(n * 1.2));
  const spacing = clusterSize;
  const positions = {};
  items.forEach((name, i) => {
    const row = Math.floor(i / cols);
    const col = i % cols;
    const xOff = (row % 2) * spacing * 0.5; // hex offset
    positions[name] = {
      x: (col - cols / 2) * spacing + xOff,
      y: (row - Math.floor(n / cols) / 2) * spacing * 0.87,
    };
  });
  return positions;
}

// ── Unified embedding layout (one map, many lenses) ──
// When TRACK_MAP is loaded, all modes except Year use the same positions.
// Labels change per mode to highlight different dimensions.

function useEmbeddingLayout(dots) {
  // Returns true if embedding positions were applied
  if (!window.TRACK_MAP) return false;
  let applied = 0;
  for (const d of dots) {
    const pos = TRACK_MAP[d.id];
    if (pos) {
      d.tx = pos[0];
      d.ty = pos[1];
      applied++;
    } else {
      // Fallback: jitter around origin
      d.tx = (Math.random() - 0.5) * 60;
      d.ty = (Math.random() - 0.5) * 60;
    }
  }
  return applied > dots.length * 0.3; // consider it working if >30% matched
}

function computeClusterLabels(dots, keyFn, minSize) {
  // Given dots already positioned, compute label positions as centroid of each group
  const groups = {};
  for (const d of dots) {
    const key = keyFn(d);
    if (!groups[key]) groups[key] = { sx: 0, sy: 0, n: 0 };
    groups[key].sx += d.tx;
    groups[key].sy += d.ty;
    groups[key].n++;
  }
  return Object.entries(groups)
    .filter(([_, g]) => g.n >= minSize)
    .map(([name, g]) => ({ text: name, x: g.sx / g.n, y: g.sy / g.n - 5 }));
}
